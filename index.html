<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Take-Fast</title>
    <link rel="icon" type="image/x-icon" href="imagenes/Favicon.ico">
    <link rel="stylesheet" href="Css/styles.css">
    <script src="js/producto-card.js"></script>
</head>
<body class="pagina-index">

    
    <div id="header"></div>

    
    <div id="panel-carrito" class="panel-carrito oculto">
        <div class="carrito-header">
            <h3>Tu Carrito</h3>
            <button onclick="cerrarCarrito()" class="btn-cerrar-panel">✖</button>
        </div>
        <div id="lista-carrito">
            <p class="carrito-vacio">No hay productos aún.</p>
        </div>
        <div class="carrito-total">
            <strong>Total: $<span id="total-carrito">0</span></strong>
        </div>
        <button class="btn-pagar">Pagar</button>
    </div>

    
    <template id="plantilla-producto">
        <div class="tarjeta-producto">
            <div class="imagen-producto">
                <img src="" alt="">
            </div>
            <p class="nombre-producto"></p>
            <p class="precio-producto"></p>
            <div class="acciones-producto">
                <button class="btn-agregar">Agregar al carrito</button>
                <input type="number" class="input-cantidad" value="1" min="1">
            </div>
        </div>
    </template>

    
    <div class="layout-principal">

        
        <div id="sidebar"></div>

        
        <div class="zona-contenido">

            <h2 class="titulo-productos">Nuestros Productos</h2>

            <h2 class="categorias">Gamer Zone</h2>
            <div class="grid-productos" id="grid-gamer"></div>

            <h2 class="categorias">Electrodomésticos</h2>
            <div class="grid-productos" id="grid-electrodomesticos"></div>

            <h2 class="categorias">Aseo</h2>
            <div class="grid-productos" id="grid-aseo"></div>

            <h2 class="categorias">Deportes</h2>
            <div class="grid-productos" id="grid-deportes"></div>

            
            <h2 class="titulo-productos">Destacados con Web Component</h2>
            <div class="grid-productos">
                <tarjeta-producto
                    nombre="Mouse"
                    precio="$100.000"
                    imagen="imagenes/gamer/Mouse.png"
                    descripcion="Mouse gamer de alta precision">
                </tarjeta-producto>

                <tarjeta-producto
                    nombre="Licuadora"
                    precio="$350.000"
                    imagen="imagenes/electrodomesticos/licuadora.jpg"
                    descripcion="Licuadora de alta potencia">
                </tarjeta-producto>

                <tarjeta-producto
                    nombre="Pelota"
                    precio="$250.000"
                    imagen="imagenes/deportes/pelota.jpg"
                    descripcion="Pelota profesional de futbol">
                </tarjeta-producto>
            </div>

        </div>
    </div>

    
    <div id="footer"></div>

    <script src="js/main.js"></script>
</body>
</html>
